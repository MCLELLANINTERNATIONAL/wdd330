<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Product Make and Name</title>

    <link rel="stylesheet" href="../css/style.css" />

    <script src="../js/product.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>
    <main class="divider">
      <section class="product-detail">
        <h2>Product Details</h2>
        <figure>
          <img src="" alt="" id="p-image" width="300" />
        </figure>
        <section id="product-info">
          <h3 id="p-brand"></h3>
          <p id="p-name"></p>

          <p id="p-price"></p>
          <p id="p-color"></p>
          <p id="p-desription">
            Description<span><br />10% Discount Price</span>
          </p>
          <div class="product-detail__add">
            <button id="addToCart" data-id="productId">Add to Cart</button>
          </div>
        </section>
      </section>
    </main>
    <footer id="main-foot">&copy;NOT a real business</footer>
  </body>
</html>
